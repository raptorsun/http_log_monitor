name: Auto-label PR

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  label:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Add labels for bundle update PRs
        if: |
          github.event.pull_request.user.login == 'raptorsun' &&
          startsWith(github.event.pull_request.title, 'Bundle Update from Snapshot ')
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['lgtm', 'approved']
            })
